<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Sales Analytics</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            overflow: hidden;
        }
        /* Animated background orbs */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            pointer-events: none;
        }
        .bg-orb-1 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(99,102,241,0.3) 0%, transparent 70%);
            top: -150px; left: -100px;
            animation: orbFloat1 20s ease-in-out infinite;
        }
        .bg-orb-2 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(168,85,247,0.25) 0%, transparent 70%);
            bottom: -100px; right: -100px;
            animation: orbFloat2 25s ease-in-out infinite;
        }
        @keyframes orbFloat1 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(60px, 40px); }
        }
        @keyframes orbFloat2 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-40px, -30px); }
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 36px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo .icon-wrap {
            width: 60px; height: 60px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }
        .login-logo .icon-wrap i {
            font-size: 28px;
            color: #fff;
        }
        .login-logo h1 {
            font-size: 22px;
            font-weight: 700;
            color: #f0f0f5;
            margin-bottom: 6px;
        }
        .login-logo p {
            font-size: 14px;
            color: rgba(240,240,245,0.5);
        }

        /* Tab Toggle */
        .auth-tabs {
            display: flex;
            background: rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 28px;
        }
        .auth-tab {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            color: rgba(240,240,245,0.5);
            transition: all 0.3s;
        }
        .auth-tab.active {
            background: rgba(99,102,241,0.3);
            color: #fff;
            box-shadow: 0 2px 10px rgba(99,102,241,0.2);
        }
        .auth-tab:hover:not(.active) {
            color: rgba(240,240,245,0.8);
        }

        /* Form */
        .auth-form { display: none; }
        .auth-form.active { display: block; }

        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: rgba(240,240,245,0.6);
            margin-bottom: 8px;
        }
        .input-wrap {
            position: relative;
        }
        .input-wrap i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(240,240,245,0.3);
            font-size: 14px;
        }
        .input-wrap input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #f0f0f5;
            font-size: 14px;
            transition: all 0.3s;
            outline: none;
        }
        .input-wrap input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
            background: rgba(255,255,255,0.08);
        }
        .input-wrap input::placeholder {
            color: rgba(240,240,245,0.3);
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99,102,241,0.35);
        }
        .auth-btn:active {
            transform: translateY(0);
        }
        .auth-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .auth-error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
            align-items: center;
            gap: 8px;
        }
        .auth-error.visible {
            display: flex;
        }

        .auth-success {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
            align-items: center;
            gap: 8px;
        }
        .auth-success.visible {
            display: flex;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: rgba(240,240,245,0.4);
            text-decoration: none;
            font-size: 13px;
            transition: color 0.3s;
        }
        .back-link a:hover {
            color: rgba(240,240,245,0.8);
        }

        /* Spinner */
        .spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Mobile */
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 24px;
            }
            .login-logo h1 {
                font-size: 19px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <div class="icon-wrap">
                    <i class="fas fa-chart-line"></i>
                </div>
                <h1>AI Sales Analytics</h1>
                <p>Sign in to your analytics dashboard</p>
            </div>

            <!-- Tab Toggle -->
            <div class="auth-tabs">
                <button class="auth-tab active" id="loginTab" onclick="switchAuthTab('login')">Sign In</button>
                <button class="auth-tab" id="registerTab" onclick="switchAuthTab('register')">Sign Up</button>
            </div>

            <!-- Error / Success -->
            <div class="auth-error" id="authError">
                <i class="fas fa-exclamation-circle"></i>
                <span id="authErrorText"></span>
            </div>
            <div class="auth-success" id="authSuccess">
                <i class="fas fa-check-circle"></i>
                <span id="authSuccessText"></span>
            </div>

            <!-- Login Form -->
            <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-wrap">
                        <i class="fas fa-user"></i>
                        <input type="text" id="loginUsername" placeholder="Enter your username" required minlength="3" autocomplete="username">
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrap">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="Enter your password" required minlength="4" autocomplete="current-password">
                    </div>
                </div>
                <button type="submit" class="auth-btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>

            <!-- Register Form -->
            <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-wrap">
                        <i class="fas fa-user"></i>
                        <input type="text" id="regUsername" placeholder="Choose a username" required minlength="3" autocomplete="username">
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrap">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="regPassword" placeholder="Choose a password" required minlength="4" autocomplete="new-password">
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="input-wrap">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="regConfirm" placeholder="Confirm your password" required minlength="4" autocomplete="new-password">
                    </div>
                </div>
                <button type="submit" class="auth-btn" id="regBtn">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <div class="back-link">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://127.0.0.1:5000/api';

        // If already logged in, redirect to app
        if (localStorage.getItem('username')) {
            window.location.href = 'app.html';
        }

        function switchAuthTab(tab) {
            document.getElementById('loginTab').classList.toggle('active', tab === 'login');
            document.getElementById('registerTab').classList.toggle('active', tab === 'register');
            document.getElementById('loginForm').classList.toggle('active', tab === 'login');
            document.getElementById('registerForm').classList.toggle('active', tab === 'register');
            hideMessages();
        }

        function showError(msg) {
            const el = document.getElementById('authError');
            document.getElementById('authErrorText').textContent = msg;
            el.classList.add('visible');
            document.getElementById('authSuccess').classList.remove('visible');
        }

        function showSuccess(msg) {
            const el = document.getElementById('authSuccess');
            document.getElementById('authSuccessText').textContent = msg;
            el.classList.add('visible');
            document.getElementById('authError').classList.remove('visible');
        }

        function hideMessages() {
            document.getElementById('authError').classList.remove('visible');
            document.getElementById('authSuccess').classList.remove('visible');
        }

        function setLoading(btn, loading) {
            if (loading) {
                btn.disabled = true;
                btn.dataset.original = btn.innerHTML;
                btn.innerHTML = '<div class="spinner"></div> Please wait...';
            } else {
                btn.disabled = false;
                btn.innerHTML = btn.dataset.original;
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            hideMessages();
            const btn = document.getElementById('loginBtn');
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                showError('Please fill in all fields');
                return;
            }

            setLoading(btn, true);

            try {
                const res = await fetch(`${API_BASE_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('username', data.username);
                    showSuccess('Login successful! Redirecting...');
                    setTimeout(() => { window.location.href = 'app.html'; }, 800);
                } else {
                    showError(data.error || 'Login failed');
                }
            } catch (err) {
                showError('Cannot connect to server. Is the backend running?');
            } finally {
                setLoading(btn, false);
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            hideMessages();
            const btn = document.getElementById('regBtn');
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;

            if (!username || !password || !confirm) {
                showError('Please fill in all fields');
                return;
            }
            if (password !== confirm) {
                showError('Passwords do not match');
                return;
            }

            setLoading(btn, true);

            try {
                const res = await fetch(`${API_BASE_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (res.ok) {
                    showSuccess('Account created! You can now sign in.');
                    setTimeout(() => {
                        switchAuthTab('login');
                        document.getElementById('loginUsername').value = username;
                        document.getElementById('loginPassword').focus();
                    }, 1000);
                } else {
                    showError(data.error || 'Registration failed');
                }
            } catch (err) {
                showError('Cannot connect to server. Is the backend running?');
            } finally {
                setLoading(btn, false);
            }
        }
    </script>
</body>
</html>
